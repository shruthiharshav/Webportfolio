        <h1 class="contact-heading">Kontakt</h1>
        <form action="https://formsubmit.co/shruthiharshav@gmail.com" method="POST">
            <!--<div class="name-row">-->
            <div>
                <p><label for="fname">Förnamn</label>
                    <input type="text" id="fname" name="firstname" required minlength="2" pattern="[A-Za-zÅÄÖåäö\- ]+"
                        placeholder="skriv ditt förnamn">
                </p>
            </div>


            <div>
                <p><label for="lname">Efternamn</label>
                    <input type="text" id="lname" name="lname" required minlength="2" pattern="[A-Za-zÅÄÖåäö\- ]+"
                        placeholder="Skriv ditt efter namn">
                </p>
            </div>

            <div class="email-field">
                <label for="email">E-Post</label>
                <input type="email" id="email" name="email" required placeholder="name@gmail.com" oninvalid="this.setCustomValidity('Fyll i e-postadressen')">
                <span class="validity"><i class="fa-solid fa-check"></i></span>
            </div>

            <div>
                <label for="message">Meddelande</label>
                <textarea id="message" name="message" rows="5" placeholder="Skriv ditt meddelande här" required
                    minlength="20" maxlength="100"></textarea>
            </div>
            <div class="submitbutton">
                <p><button onclick="myfunction()" type="submit">Send</button></p>
            </div>


            <!--Spinner--
            <div class="spinner">

            </div>-->

            

     
        </form>
