            <script>
                function setLanguage(lang) {
                    document.querySelectorAll("[data-en]").forEach(el => {
                        el.innerText = el.getAttribute("data-" + lang);
                    });

                    localStorage.setItem("lang", lang);

                    const slider = document.querySelector(".slider");

                    if (lang === "en") {
                        slider.style.left = "4px";
                    } else {
                        slider.style.left = "46px";
                    }
                }

                window.onload = function () {
                    setLanguage(localStorage.getItem("lang") || "en");
                };
            </script>
            <script>

                function setLanguage(lang) {
                    // change text
                    document.querySelectorAll("[data-en]").forEach(el => {
                        el.innerText = el.getAttribute("data-" + lang);
                    });

                    localStorage.setItem("lang", lang);

                    // remove active styles
                    document.getElementById("enFlag").classList.remove("lang-active");
                    document.getElementById("svFlag").classList.remove("lang-active");

                    // set active flag
                    if (lang === "en") {
                        document.getElementById("enFlag").classList.add("lang-active");
                    } else {
                        document.getElementById("svFlag").classList.add("lang-active");
                    }
                }

                // load saved language
                window.onload = function () {
                    const lang = localStorage.getItem("lang") || "en";
                    setLanguage(lang);
                };
            </script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const themeBtn = document.getElementById("themeBtn");
    const icon = themeBtn.querySelector("i");

    function updateIcon() {
        if(document.body.classList.contains("dark-mode")){
            icon.className = "fa-solid fa-sun";
        } else {
            icon.className = "fa-solid fa-moon";
        }
    }

    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark-mode");
    }

    updateIcon();

    themeBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");

        localStorage.setItem(
            "theme",
            document.body.classList.contains("dark-mode") ? "dark" : "light"
        );

        updateIcon();
    });

});

</script>

<script>
    document.addEventListener("DOMContentLoaded", () => {

    const toggleBtn = document.getElementById("themeToggle");
    const icon = toggleBtn.querySelector("i");

    // load saved theme
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        icon.classList.replace("fa-moon", "fa-sun");
    }

    toggleBtn.addEventListener("click", () => {

        document.body.classList.toggle("dark-mode");

        const isDark = document.body.classList.contains("dark-mode");

        if (isDark) {
            icon.classList.replace("fa-moon", "fa-sun");
            localStorage.setItem("theme", "dark");
        } else {
            icon.classList.replace("fa-sun", "fa-moon");
            localStorage.setItem("theme", "light");
        }

    });

});
</script>
