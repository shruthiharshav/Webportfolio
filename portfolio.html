          <script>
            let slideIndex = 1;
            showSlides(slideIndex);

            function plusSlides(n) {
              showSlides(slideIndex += n);
            }

            function currentSlide(n) {
              showSlides(slideIndex = n);
            }

            function showSlides(n) {
              let i;
              let slides = document.getElementsByClassName("mySlides");
              let dots = document.getElementsByClassName("dot");
              if (n > slides.length) { slideIndex = 1 }
              if (n < 1) { slideIndex = slides.length }
              for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
              }
              for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
              }
              slides[slideIndex - 1].style.display = "block";
              dots[slideIndex - 1].className += " active";
            }
          </script>

      <script>
function setLanguage(lang) {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.innerText = el.getAttribute("data-" + lang);
    });

    localStorage.setItem("lang", lang);

    const slider = document.querySelector(".slider");

    if (lang === "en") {
        slider.style.left = "4px";
    } else {
        slider.style.left = "46px";
    }
}

window.onload = function () {
    setLanguage(localStorage.getItem("lang") || "en");
};
</script>
      <script>
        
function setLanguage(lang) {
    // change text
    document.querySelectorAll("[data-en]").forEach(el => {
        el.innerText = el.getAttribute("data-" + lang);
    });

    localStorage.setItem("lang", lang);

    // remove active styles
    document.getElementById("enFlag").classList.remove("lang-active");
    document.getElementById("svFlag").classList.remove("lang-active");

    // set active flag
    if (lang === "en") {
        document.getElementById("enFlag").classList.add("lang-active");
    } else {
        document.getElementById("svFlag").classList.add("lang-active");
    }
}

// load saved language
window.onload = function () {
    const lang = localStorage.getItem("lang") || "en";
    setLanguage(lang);
};
</script>
